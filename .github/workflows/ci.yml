name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run tests
        run: poetry run python3 -m pytest -q
      - name: Build wheel (packaging gate)
        run: |
          poetry build
          # the wheel must ship the services scripts
          unzip -l dist/*.whl | grep -q "g3dt/services/dictionary/deploy_dd.sh"
